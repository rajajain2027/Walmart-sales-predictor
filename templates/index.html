<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Walmart Sales Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0a1628;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.card {
  background: #111e2e;
  border: 1px solid rgba(34,136,212,0.20);
  border-radius: 18px;
  padding: 2.5rem;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.header {
  text-align: center;
  margin-bottom: 2rem;
}

.logo {
  font-size: 2.2rem;
  margin-bottom: 0.6rem;
}

h1 {
  font-size: 1.4rem;
  font-weight: 800;
  color: #d8e8f5;
  letter-spacing: -0.4px;
}

.subtitle {
  font-size: 12.5px;
  color: #5a7a96;
  margin-top: 5px;
}

/* Form */
.field {
  margin-bottom: 1.2rem;
}

label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: #5a7a96;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

select, input[type="date"] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(34,136,212,0.22);
  border-radius: 10px;
  color: #d8e8f5;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: auto;
}

select:focus, input[type="date"]:focus {
  border-color: #2288d4;
  box-shadow: 0 0 0 3px rgba(34,136,212,0.12);
}

select option { background: #111e2e; }

button {
  width: 100%;
  padding: 13px;
  margin-top: 0.4rem;
  border: none;
  border-radius: 11px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  color: white;
  background: linear-gradient(135deg, #0f2942 0%, #2288d4 100%);
  box-shadow: 0 4px 18px rgba(34,136,212,0.30);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.15s, box-shadow 0.2s;
}

button:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(34,136,212,0.40); }
button:active { transform: none; }

/* Result */
.result {
  margin-top: 1.8rem;
  padding: 1.6rem;
  border-radius: 13px;
  background: linear-gradient(135deg, rgba(15,122,74,0.12), rgba(15,122,74,0.05));
  border: 1px solid rgba(15,122,74,0.30);
  text-align: center;
  display: none;
  animation: pop 0.3s ease;
}

.result.holiday {
  background: linear-gradient(135deg, rgba(196,154,10,0.12), rgba(196,154,10,0.05));
  border-color: rgba(240,192,64,0.35);
}

@keyframes pop {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

.result-label {
  font-size: 12px;
  font-weight: 600;
  color: #5a7a96;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 8px;
}

.result-amount {
  font-size: 2.8rem;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  color: #22c080;
}

.result.holiday .result-amount { color: #f0c040; }

.result-week {
  font-size: 13px;
  color: #5a7a96;
  margin-top: 8px;
}

.hol-badge {
  display: inline-block;
  margin-top: 10px;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(240,192,64,0.15);
  color: #f0c040;
  border: 1px solid rgba(240,192,64,0.30);
}

/* Spinner */
.spin {
  display: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  margin-top: 1rem;
  padding: 10px 14px;
  border-radius: 8px;
  background: rgba(176,48,48,0.10);
  border: 1px solid rgba(176,48,48,0.30);
  color: #e07070;
  font-size: 13px;
  display: none;
}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">🛒</div>
    <h1>Walmart Sales Predictor</h1>
    <div class="subtitle">Random Forest · R² 98.16% · Real Kaggle Data</div>
  </div>

  <div class="field">
    <label>Store Number</label>
    <select id="store">
      {% for s in stores %}
      <option value="{{ s }}">Store {{ s }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="field">
    <label>Week Starting Date</label>
    <input type="date" id="date" value="2013-02-01">
  </div>

  <button onclick="predict()">
    <span id="btnTxt">Predict Weekly Sales</span>
    <div class="spin" id="spin"></div>
  </button>

  <div class="result" id="result">
    <div class="result-label">Predicted Weekly Sales</div>
    <div class="result-amount" id="amount">—</div>
    <div class="result-week" id="weekInfo">—</div>
    <div class="hol-badge" id="holBadge" style="display:none">🎉 Holiday Week</div>
  </div>

  <div class="error-msg" id="errMsg"></div>
</div>

<script>
async function predict() {
  const store = document.getElementById('store').value;
  const date  = document.getElementById('date').value;

  if (!date) { showErr('Please select a date.'); return; }

  document.getElementById('btnTxt').textContent = 'Predicting…';
  document.getElementById('spin').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('errMsg').style.display  = 'none';

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ store, date })
    });
    const d = await res.json();

    if (!d.ok) { showErr(d.error); return; }

    const box = document.getElementById('result');
    box.className = 'result' + (d.is_holiday ? ' holiday' : '');

    document.getElementById('amount').textContent =
      '$' + d.prediction.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

    const dt = new Date(date + 'T00:00:00');
    const fmt = dt.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
    document.getElementById('weekInfo').textContent = `Week of ${fmt} · Store ${store}`;

    const hb = document.getElementById('holBadge');
    hb.style.display = d.is_holiday ? 'inline-block' : 'none';

    box.style.display = 'block';

  } catch(e) {
    showErr('Something went wrong. Is the server running?');
  } finally {
    document.getElementById('btnTxt').textContent = 'Predict Weekly Sales';
    document.getElementById('spin').style.display  = 'none';
  }
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
